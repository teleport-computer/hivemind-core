name: Build & Push Images

on:
  push:
    branches: [main]
    # Keep auto-deploys tied to runtime/build inputs. CI still runs on
    # every push, but docs/eval/autoresearch-only changes should not
    # create a new image tag, compose_hash, or owner_approved room churn.
    paths:
      - ".dockerignore"
      - ".github/workflows/build-images.yml"
      - ".github/workflows/deploy.yml"
      - "agents/**"
      - "deploy/**"
      - "hivemind/**"
      - "pyproject.toml"
      - "uv.lock"
      - "LICENSE"
  workflow_dispatch:
    inputs:
      version:
        description: "Optional extra tag (e.g. 1.0.0). Leave empty for :<short-sha> + :latest only."
        required: false
        default: ""
      targets:
        description: "Images to build (comma-separated: core,postgres,sql-proxy,base-sdk or all)"
        required: false
        default: "all"

env:
  REGISTRY: ghcr.io
  # Keep build provenance attestable through source + image digests, but do
  # not retain Docker build records as public GitHub artifacts.
  DOCKER_BUILD_RECORD_UPLOAD: "false"
  DOCKER_BUILD_RECORD_RETENTION_DAYS: "1"

# Action SHAs resolved 2026-04-29:
# - actions/checkout v6.0.2
# - docker/setup-buildx-action v4.0.0
# - docker/login-action v4.1.0
# - docker/metadata-action v6.0.0
# - docker/build-push-action v7.1.0

jobs:
  # ---------- compute lowercase namespace (Docker requires lowercase tags) ----------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      ns: ${{ steps.lower.outputs.ns }}
      version: ${{ steps.ver.outputs.version }}
    steps:
      - id: lower
        run: echo "ns=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=" >> "$GITHUB_OUTPUT"
          fi

  # ---------- base SDK (shared layer for all agent images) ----------
  base-sdk:
    needs: prepare
    if: >-
      github.event_name != 'workflow_dispatch' ||
      contains(github.event.inputs.targets, 'base-sdk') ||
      github.event.inputs.targets == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GA_GHCR_TOKEN }}

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.ns }}/hivemind-agent-base
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }},enable=${{ needs.prepare.outputs.version != '' }}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        id: build
        with:
          context: agents/base
          file: agents/base/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=base-sdk
          cache-to: type=gha,mode=max,scope=base-sdk

      - name: Print image info
        run: |
          echo "### hivemind-agent-base" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Digest:** \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tags:** ${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"

  # ---------- hivemind-core ----------
  core:
    needs: prepare
    if: >-
      github.event_name != 'workflow_dispatch' ||
      contains(github.event.inputs.targets, 'core') ||
      github.event.inputs.targets == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GA_GHCR_TOKEN }}

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.ns }}/hivemind-core
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }},enable=${{ needs.prepare.outputs.version != '' }}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        id: build
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=core
          cache-to: type=gha,mode=max,scope=core

      - name: Print image info
        run: |
          echo "### hivemind-core" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Digest:** \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tags:** ${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"

  # ---------- hivemind-postgres ----------
  postgres:
    needs: prepare
    if: >-
      github.event_name != 'workflow_dispatch' ||
      contains(github.event.inputs.targets, 'postgres') ||
      github.event.inputs.targets == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GA_GHCR_TOKEN }}

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.ns }}/hivemind-postgres
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }},enable=${{ needs.prepare.outputs.version != '' }}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        id: build
        with:
          context: deploy
          file: deploy/postgres/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=postgres
          cache-to: type=gha,mode=max,scope=postgres

      - name: Print image info
        run: |
          echo "### hivemind-postgres" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Digest:** \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tags:** ${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"

  # ---------- sql-proxy (sidecar for postgres CVM) ----------
  sql-proxy:
    needs: prepare
    if: >-
      github.event_name != 'workflow_dispatch' ||
      contains(github.event.inputs.targets, 'sql-proxy') ||
      github.event.inputs.targets == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GA_GHCR_TOKEN }}

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.ns }}/hivemind-sql-proxy
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }},enable=${{ needs.prepare.outputs.version != '' }}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        id: build
        with:
          context: deploy
          file: deploy/postgres/Dockerfile.sql-proxy
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=sql-proxy
          cache-to: type=gha,mode=max,scope=sql-proxy

      - name: Print image info
        run: |
          echo "### hivemind-sql-proxy" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Digest:** \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tags:** ${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
