name: Build & Push Images

on:
  push:
    branches: [main]
    # Keep auto-deploys tied to runtime/build inputs. CI still runs on
    # every push, but docs/eval/autoresearch-only changes should not
    # create a new image tag, compose_hash, or owner_approved room churn.
    paths:
      - ".dockerignore"
      - ".github/workflows/build-images.yml"
      - ".github/workflows/deploy.yml"
      - "agents/**"
      - "deploy/**"
      - "!deploy/**/*.md"
      - "hivemind/**"
      - "pyproject.toml"
      - "uv.lock"
      - "LICENSE"
  workflow_dispatch:
    inputs:
      version:
        description: "Optional extra tag (e.g. 1.0.0). Leave empty for :<short-sha> + :latest only."
        required: false
        default: ""
      targets:
        description: "Images to build (comma-separated: core,postgres,sql-proxy,base-sdk,base-sdk-hermes,default-hermes or all)"
        required: false
        default: "all"

env:
  REGISTRY: ghcr.io
  # Keep build provenance attestable through source + image digests, but do
  # not retain Docker build records as public GitHub artifacts.
  DOCKER_BUILD_RECORD_UPLOAD: "false"
  DOCKER_BUILD_RECORD_RETENTION_DAYS: "1"

# Action SHAs resolved 2026-04-29:
# - actions/checkout v6.0.2
# - docker/setup-buildx-action v4.0.0
# - docker/login-action v4.1.0
# - docker/metadata-action v6.0.0
# - docker/build-push-action v7.1.0

jobs:
  # ---------- compute lowercase namespace (Docker requires lowercase tags) ----------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      ns: ${{ steps.lower.outputs.ns }}
      version: ${{ steps.ver.outputs.version }}
      short_sha: ${{ steps.sha.outputs.short_sha }}
    steps:
      - id: lower
        run: echo "ns=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=" >> "$GITHUB_OUTPUT"
          fi
      - id: sha
        run: echo "short_sha=$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

  # ---------- base SDK (shared layer for all agent images) ----------
  base-sdk:
    needs: prepare
    if: >-
      github.event_name != 'workflow_dispatch' ||
      contains(github.event.inputs.targets, 'base-sdk') ||
      github.event.inputs.targets == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GA_GHCR_TOKEN }}

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.ns }}/hivemind-agent-base
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }},enable=${{ needs.prepare.outputs.version != '' }}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        id: build
        with:
          context: agents/base
          file: agents/base/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=base-sdk
          cache-to: type=gha,mode=max,scope=base-sdk

      - name: Print image info
        run: |
          echo "### hivemind-agent-base" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Digest:** \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tags:** ${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"

  # ---------- base SDK Hermes (NousResearch/hermes-agent harness) ----------
  base-sdk-hermes:
    needs: prepare
    if: >-
      github.event_name != 'workflow_dispatch' ||
      contains(github.event.inputs.targets, 'base-sdk-hermes') ||
      contains(github.event.inputs.targets, 'default-hermes') ||
      github.event.inputs.targets == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GA_GHCR_TOKEN }}

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.ns }}/hivemind-agent-base-hermes
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }},enable=${{ needs.prepare.outputs.version != '' }}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        id: build
        with:
          context: agents/base-hermes
          file: agents/base-hermes/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=base-sdk-hermes
          cache-to: type=gha,mode=max,scope=base-sdk-hermes

      - name: Print image info
        run: |
          echo "### hivemind-agent-base-hermes" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Digest:** \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tags:** ${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"

  # ---------- default Hermes agents (query/scope/mediator) ----------
  default-hermes:
    needs: [prepare, base-sdk-hermes]
    if: >-
      github.event_name != 'workflow_dispatch' ||
      contains(github.event.inputs.targets, 'default-hermes') ||
      github.event.inputs.targets == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        role: [query, scope, mediator]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GA_GHCR_TOKEN }}

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.ns }}/hivemind-default-${{ matrix.role }}-hermes
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }},enable=${{ needs.prepare.outputs.version != '' }}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        id: build
        with:
          context: agents/default-${{ matrix.role }}-hermes
          file: agents/default-${{ matrix.role }}-hermes/Dockerfile
          push: true
          build-args: |
            HIVEMIND_AGENT_BASE_HERMES_IMAGE=${{ env.REGISTRY }}/${{ needs.prepare.outputs.ns }}/hivemind-agent-base-hermes:${{ needs.prepare.outputs.short_sha }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=default-${{ matrix.role }}-hermes
          cache-to: type=gha,mode=max,scope=default-${{ matrix.role }}-hermes

      - name: Smoke default Hermes image
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.ns }}/hivemind-default-${{ matrix.role }}-hermes:${{ needs.prepare.outputs.short_sha }}
          ROLE: ${{ matrix.role }}
        run: |
          set -euo pipefail
          docker pull "$IMAGE"
          docker run --rm -i \
            -e BRIDGE_URL=http://127.0.0.1:1 \
            -e SESSION_TOKEN=ci-smoke \
            -e HIVEMIND_AGENT_ROLE="$ROLE" \
            -e QUERY_PROMPT=ci-smoke \
            -e RAW_OUTPUT=ci-smoke \
            "$IMAGE" python - <<'PY'
          import importlib.util
          import os
          import sys
          from pathlib import Path

          role = os.environ["HIVEMIND_AGENT_ROLE"]
          path = Path("/app/hivemind_agent.py")
          if not path.exists():
              raise SystemExit("/app/hivemind_agent.py missing")
          if Path("/app/agent.py").exists():
              raise SystemExit("/app/agent.py must not shadow the Hermes package")

          spec = importlib.util.spec_from_file_location("hivemind_agent_smoke", path)
          mod = importlib.util.module_from_spec(spec)
          assert spec.loader is not None
          spec.loader.exec_module(mod)

          from tools.registry import registry

          def registered_names() -> set[str]:
              if hasattr(registry, "get_tool_names_for_toolset"):
                  return set(registry.get_tool_names_for_toolset("hivemind"))
              if hasattr(registry, "get_tools_for_toolset"):
                  tools = registry.get_tools_for_toolset("hivemind")
                  return {getattr(t, "name", str(t)) for t in tools}
              for attr in ("tools", "_tools", "registry", "_registry"):
                  value = getattr(registry, attr, None)
                  if isinstance(value, dict):
                      names = set()
                      for key, tool in value.items():
                          toolset = getattr(tool, "toolset", None)
                          if toolset is None and isinstance(tool, dict):
                              toolset = tool.get("toolset")
                          if toolset == "hivemind" or str(key).startswith("hivemind."):
                              names.add(getattr(tool, "name", None) or str(key).split(".")[-1])
                      if names:
                          return names
              raise SystemExit(
                  "could not inspect Hermes registry; attrs="
                  + ",".join(sorted(a for a in dir(registry) if "tool" in a.lower()))
              )

          expected = {
              "query": {
                  "execute_sql",
                  "get_schema",
                  "upload_artifact",
                  "upload_report_artifact",
              },
              "scope": {
                  "execute_sql",
                  "get_schema",
                  "verify_scope_fn",
                  "simulate_query",
                  "simulate_multi",
                  "list_query_agent_files",
                  "read_query_agent_file",
              },
              "mediator": set(),
          }[role]
          actual = registered_names()
          if actual != expected:
              raise SystemExit(
                  f"{role} tool registry mismatch: expected={sorted(expected)} "
                  f"actual={sorted(actual)}"
              )
          print(f"{role} Hermes image smoke OK: {sorted(actual)}")
          PY

      - name: Print image info
        run: |
          echo "### hivemind-default-${{ matrix.role }}-hermes" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Digest:** \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tags:** ${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"

  # ---------- hivemind-core ----------
  core:
    needs: prepare
    if: >-
      github.event_name != 'workflow_dispatch' ||
      contains(github.event.inputs.targets, 'core') ||
      github.event.inputs.targets == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GA_GHCR_TOKEN }}

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.ns }}/hivemind-core
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }},enable=${{ needs.prepare.outputs.version != '' }}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        id: build
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=core
          cache-to: type=gha,mode=max,scope=core

      - name: Print image info
        run: |
          echo "### hivemind-core" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Digest:** \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tags:** ${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"

  # ---------- hivemind-postgres ----------
  postgres:
    needs: prepare
    if: >-
      github.event_name != 'workflow_dispatch' ||
      contains(github.event.inputs.targets, 'postgres') ||
      github.event.inputs.targets == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GA_GHCR_TOKEN }}

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.ns }}/hivemind-postgres
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }},enable=${{ needs.prepare.outputs.version != '' }}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        id: build
        with:
          context: deploy
          file: deploy/postgres/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=postgres
          cache-to: type=gha,mode=max,scope=postgres

      - name: Print image info
        run: |
          echo "### hivemind-postgres" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Digest:** \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tags:** ${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"

  # ---------- sql-proxy (sidecar for postgres CVM) ----------
  sql-proxy:
    needs: prepare
    if: >-
      github.event_name != 'workflow_dispatch' ||
      contains(github.event.inputs.targets, 'sql-proxy') ||
      github.event.inputs.targets == 'all'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GA_GHCR_TOKEN }}

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.ns }}/hivemind-sql-proxy
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }},enable=${{ needs.prepare.outputs.version != '' }}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
        id: build
        with:
          context: deploy
          file: deploy/postgres/Dockerfile.sql-proxy
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=sql-proxy
          cache-to: type=gha,mode=max,scope=sql-proxy

      - name: Print image info
        run: |
          echo "### hivemind-sql-proxy" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Digest:** \`${{ steps.build.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tags:** ${{ steps.meta.outputs.tags }}" >> "$GITHUB_STEP_SUMMARY"
