name: CI (pytest)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        # postgres:16, resolved 2026-04-29.
        image: postgres:16@sha256:71e27bf60b70bded003791b5573f8b808365613f341df20ffcf0c1ed7bc13ddf
        env:
          POSTGRES_USER: hivemind
          POSTGRES_PASSWORD: dev
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hivemind"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      HIVEMIND_TEST_DATABASE_URL: postgresql://hivemind:dev@localhost:5432/postgres

    steps:
      # actions/checkout v6.0.2
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install uv
        # astral-sh/setup-uv v8.1.0
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: latest

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --frozen --all-extras

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Run unit tests
        # Real Docker integration tests need the EC2 relay. The DockerRunner
        # unit tests are mocked and stay in the normal CI gate.
        run: |
          uv run pytest -q \
            --ignore=tests/test_integration_docker.py
