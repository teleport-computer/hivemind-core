name: Deploy to Phala CVM (via EC2 relay)

# Redeploys hivemind-core and/or hivemind-pg on Phala Cloud. The
# GitHub-hosted runner never sees production secrets — it SSHes into a
# long-lived EC2 box (the "relay") that holds the authoritative `.env`
# and an authenticated `phala` CLI. The relay runs
# `deploy/phala/deploy.sh`, which has its own pre-checks (required
# ${VAR:?} vars present, sealed-env re-push, health poll with serial
# logs on timeout).
#
# Why a relay instead of putting `.env` in GitHub secrets directly:
#   - one source of truth for the production env (file on EC2)
#   - rotating a key means editing one file on one box, not re-uploading
#     ~17 individual GH secrets
#   - the `phala` CLI is stateful (~/.phala-cloud/credentials.json); the
#     relay holds that state so each deploy doesn't re-auth
#
# Manual-only (workflow_dispatch). We intentionally do NOT auto-deploy
# on build-images success — redeploys should be an explicit decision.
#
# Prereqs on the EC2 relay (see deploy/ec2/README.md for bootstrap):
#   - node + phala CLI installed, `phala status` shows correct workspace
#   - ~/hivemind-core cloned (read-only deploy key)
#   - ~/hivemind-core/deploy/phala/.env populated with every ${VAR:?}
#     referenced by both compose files
#
# Required GH secrets:
#   EC2_HOST              — IP or hostname of the relay
#   EC2_USER              — SSH user (typically "ubuntu")
#   EC2_SSH_PRIVATE_KEY   — OpenSSH private key authorized on the relay
#   PHALA_CLOUD_API_KEY   — optional; injected per-run so the relay
#                           doesn't depend on stale stored creds
#   CLOUDFLARE_API_TOKEN  — optional override; if set, replaces the
#                           token in the relay's .env for this deploy
#                           only. Must be a Zone.DNS:Edit token on the
#                           teleport.computer zone. Leave empty in GH
#                           secrets to use the value baked into the
#                           relay's deploy/phala/.env.
#
# Inputs:
#   target     — core | postgres | all (which CVM(s) to redeploy)
#   ref        — git ref to deploy (default: main). Research branches OK.
#   image_sha  — optional; if set, the compose file's image pin is
#                rewritten to ghcr.io/account-link/hivemind-core:<sha>
#                for this run only (not committed back). Leave empty to
#                use whatever pin is on the checked-out ref.

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Which CVM to redeploy"
        required: true
        default: "core"
        type: choice
        options:
          - core
          - postgres
          - all
      ref:
        description: "Git ref to deploy from (branch, tag, or commit)"
        required: false
        default: "main"
      image_sha:
        description: "Optional image SHA override for hivemind-core (e.g. fd87c82). Leave empty to use the ref's committed pin."
        required: false
        default: ""
      node_id:
        description: "Optional Phala node-id for FIRST-TIME create on a new cluster (e.g. 18 = prod9). Leave empty for normal in-place updates of an existing CVM."
        required: false
        default: ""

concurrency:
  group: phala-deploy-${{ github.event.inputs.target }}
  cancel-in-progress: false

jobs:
  deploy:
    name: "Deploy ${{ github.event.inputs.target }} @ ${{ github.event.inputs.ref }}"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TARGET: ${{ github.event.inputs.target }}
      DEPLOY_REF: ${{ github.event.inputs.ref }}
      IMAGE_SHA: ${{ github.event.inputs.image_sha }}
      NODE_ID: ${{ github.event.inputs.node_id }}

    steps:
      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sanity — show target host
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes \
            -o ServerAliveInterval=30 -o ServerAliveCountMax=20 \
            -o TCPKeepAlive=yes \
            "${EC2_USER}@${EC2_HOST}" \
            'echo "relay: $(hostname) $(whoami)"; phala --version; phala status | head -10'

      - name: Deploy via relay
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          set -euo pipefail

          # All work happens inside this SSH session. We use a heredoc
          # with quoted 'REMOTE' so no local variables get interpolated
          # — the relay sees the exact script text, and GH Action env
          # vars are forwarded explicitly via `ssh -o SendEnv` which
          # requires AcceptEnv on the server. Simpler: pass them as
          # leading `KEY=VALUE` pairs on the command line instead.
          #
          # CLOUDFLARE_API_TOKEN: pass as override only when set in GH
          # secrets — empty string is treated as "use the relay's .env
          # value". The deploy script's pre-check enforces the var is
          # present, so dropping it would never silently break.

          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes \
            -o ServerAliveInterval=30 -o ServerAliveCountMax=20 \
            -o TCPKeepAlive=yes \
            "${EC2_USER}@${EC2_HOST}" \
            "TARGET='${TARGET}' DEPLOY_REF='${DEPLOY_REF}' IMAGE_SHA='${IMAGE_SHA}' NODE_ID='${NODE_ID}' PHALA_CLOUD_API_KEY='${PHALA_CLOUD_API_KEY}' CLOUDFLARE_API_TOKEN_OVERRIDE='${CLOUDFLARE_API_TOKEN}' bash -s" <<'REMOTE'
          set -euo pipefail
          cd ~/hivemind-core

          echo "── fetch + checkout ─────────────────────────────"
          git fetch --prune origin
          git checkout --detach "origin/${DEPLOY_REF}" 2>/dev/null \
            || git checkout --detach "${DEPLOY_REF}"
          echo "HEAD: $(git rev-parse --short HEAD)"

          if [ -n "${IMAGE_SHA:-}" ]; then
            echo "── pin override: rewriting image to :${IMAGE_SHA} ──"
            # Only rewrites in the running working tree — not committed.
            sed -i -E "s|(ghcr\.io/account-link/hivemind-core:)[A-Za-z0-9._-]+|\1${IMAGE_SHA}|" \
              deploy/phala/docker-compose.core.yaml
            grep "image:" deploy/phala/docker-compose.core.yaml
          fi

          if [ -n "${CLOUDFLARE_API_TOKEN_OVERRIDE:-}" ]; then
            echo "── CF token override: patching deploy/phala/.env (per-run) ──"
            # Replace the existing line if present, else append.
            if grep -q '^CLOUDFLARE_API_TOKEN=' deploy/phala/.env; then
              sed -i -E "s|^CLOUDFLARE_API_TOKEN=.*|CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN_OVERRIDE}|" \
                deploy/phala/.env
            else
              echo "CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN_OVERRIDE}" >> deploy/phala/.env
            fi
          fi

          echo "── deploy ($TARGET) ─────────────────────────────"
          # NODE_ID is forwarded here too — deploy.sh uses it to switch
          # between create-mode (`-n <name> --node-id <id>`) and the
          # default in-place update (`--cvm-id <name>`). Empty → update.
          NODE_ID="${NODE_ID:-}" ./deploy/phala/deploy.sh "${TARGET}"
          REMOTE

      # On-chain compose-hash registration. After a successful core
      # deploy, the new image's `compose_hash` (which dstack writes
      # into the TDX quote's `mr_config_id`) must be approved on the
      # HivemindAppAuth contract before any CLI client can connect
      # without a manual TOFU prompt. We do this from CI rather than
      # by hand because (a) the hash changes every time the compose
      # file or any image pin changes, and (b) `cast send` with the
      # owner key is the actual gate — keeping that key in GH secrets
      # means the owner doesn't have to be online to ship.
      #
      # Idempotent: skipped silently if `isAppAllowed` already true,
      # so re-runs of the same image are no-ops.
      #
      # Skipped on postgres-only deploys (hivemind-pg has its own
      # compose_hash but isn't gated by this contract).
      - name: Install foundry (for cast)
        if: github.event.inputs.target != 'postgres'
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Approve compose_hash on-chain
        if: github.event.inputs.target != 'postgres'
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          CONTRACT: "0x29b475E6D2e10bd3266569D4c5cf27BFd4f8c36E"
          RPC_URL: "https://ethereum-sepolia-rpc.publicnode.com"
          DEPLOY_REF: ${{ github.event.inputs.ref }}
        run: |
          set -euo pipefail

          if [ -z "${PRIVATE_KEY:-}" ]; then
            echo "::warning::PRIVATE_KEY secret not set — skipping on-chain approval. Hash will need manual approval before non-trust clients can connect."
            exit 0
          fi

          # Fetch the *live* compose_hash from the freshly-deployed
          # CVM rather than re-deriving it locally. This is the same
          # hash the CLI's TOFU prompt would show, sourced from
          # `mr_config_id` in the TDX quote — i.e. what dstack
          # actually measured, not what we *thought* we shipped.
          ATTEST_URL="https://hivemind.teleport.computer/v1/attestation"
          echo "fetching compose_hash from ${ATTEST_URL}"
          HASH=""
          for i in 1 2 3 4 5; do
            HASH=$(curl -fsk --max-time 15 "${ATTEST_URL}" 2>/dev/null \
              | jq -r '.attestation.compose_hash // empty')
            [ -n "${HASH}" ] && break
            echo "  attempt ${i}: empty/unavailable, retrying in 10s…"
            sleep 10
          done
          if [ -z "${HASH}" ]; then
            echo "::error::could not fetch compose_hash from ${ATTEST_URL}"
            exit 1
          fi
          echo "live compose_hash: ${HASH}"

          # Idempotent guard: skip if the contract already lists
          # this hash as approved (re-deploys of the same image, or
          # workflow re-runs).
          ALREADY=$(cast call --rpc-url "${RPC_URL}" "${CONTRACT}" \
            'isAppAllowed(bytes32)(bool)' "0x${HASH}" 2>/dev/null || echo "false")
          if [ "${ALREADY}" = "true" ]; then
            echo "compose_hash 0x${HASH} already approved — skipping cast send"
            exit 0
          fi

          GIT_SHA=$(git rev-parse HEAD)
          COMPOSE_URI="https://github.com/Account-Link/hivemind-core/blob/${GIT_SHA}/deploy/phala/docker-compose.core.yaml"

          echo "approving on ${CONTRACT} (Sepolia)"
          cast send "${CONTRACT}" \
            'addComposeHash(bytes32,string,string)' \
            "0x${HASH}" \
            "${GIT_SHA}" \
            "${COMPOSE_URI}" \
            --rpc-url "${RPC_URL}" \
            --private-key "${PRIVATE_KEY}" \
            --confirmations 1

          echo "verifying…"
          AFTER=$(cast call --rpc-url "${RPC_URL}" "${CONTRACT}" \
            'isAppAllowed(bytes32)(bool)' "0x${HASH}")
          if [ "${AFTER}" != "true" ]; then
            echo "::error::post-tx verification failed (isAppAllowed=${AFTER})"
            exit 1
          fi
          echo "✓ compose_hash 0x${HASH} approved on-chain"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_ed25519
