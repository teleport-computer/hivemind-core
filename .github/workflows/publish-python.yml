name: Publish Python Package

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build wheel and sdist
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      - name: Verify public uv tool install
        run: |
          VERSION="$(uv run python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          for attempt in $(seq 1 12); do
            if uv tool install --force --refresh-package hmctl "hmctl==${VERSION}"; then
              break
            fi
            if [ "$attempt" = "12" ]; then
              echo "hmctl==${VERSION} was not installable from PyPI after retries" >&2
              exit 1
            fi
            sleep 10
          done
          hmctl --version
          hivemind --version
