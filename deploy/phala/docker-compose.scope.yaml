# docker-compose.scope.yaml — Persistent scope agent CVM
#
# Deploy: phala deploy -n hivemind-scope -c deploy/phala/docker-compose.scope.yaml

services:
  agent:
    image: ghcr.io/account-link/hivemind-scope:latest
    environment:
      AGENT_COMMAND: "python agent.py"
      RUNNER_PORT: "8080"
    ports:
      - "8080:8080"
