# docker-compose.index.yaml — Persistent index agent CVM
#
# Deploy: phala deploy -n hivemind-index -c deploy/phala/docker-compose.index.yaml

services:
  agent:
    image: ghcr.io/account-link/hivemind-index:latest
    environment:
      AGENT_COMMAND: "python agent.py"
      RUNNER_PORT: "8080"
    ports:
      - "8080:8080"
