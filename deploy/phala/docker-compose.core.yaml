# docker-compose.core.yaml — Phala CVM deployment for hivemind-core
#
# Deploy:
#   phala deploy -n hivemind-core -c deploy/phala/docker-compose.core.yaml -e deploy/phala/.env.core --wait
#
# Prerequisites:
#   - Postgres CVM deployed separately (see docker-compose.postgres.yaml)
#   - Images pushed to GHCR (see push-ghcr.sh)
#   - All env vars set in Phala Cloud dashboard or .env file
#
# Networking:
#   - Port 8100 is exposed as https://<cvm_id>-8100.app.phala.network
#   - This public URL is needed for HIVEMIND_PHALA_PUBLIC_URL config
#   - Connects to postgres CVM via its public URL

services:
  hivemind:
    image: ghcr.io/account-link/hivemind-core:latest
    environment:
      # Database — set to the SQL proxy URL on the postgres CVM
      # Format: https://<pg_cvm_id>-8080.app.phala.network
      HIVEMIND_DATABASE_URL: ${HIVEMIND_DATABASE_URL:?Set to SQL proxy URL}
      HIVEMIND_SQL_PROXY_KEY: ${HIVEMIND_SQL_PROXY_KEY:?Set SQL proxy shared secret}

      # Server
      HIVEMIND_HOST: "0.0.0.0"
      HIVEMIND_PORT: "8100"
      HIVEMIND_API_KEY: ${HIVEMIND_API_KEY:?Set API key}

      # LLM proxy
      HIVEMIND_LLM_API_KEY: ${HIVEMIND_LLM_API_KEY:?Set LLM API key}
      HIVEMIND_LLM_BASE_URL: ${HIVEMIND_LLM_BASE_URL:-https://openrouter.ai/api/v1}
      HIVEMIND_LLM_MODEL: ${HIVEMIND_LLM_MODEL:-anthropic/claude-sonnet-4.5}

      # Sandbox — Phala backend
      HIVEMIND_SANDBOX_BACKEND: "phala"
      HIVEMIND_PHALA_API_KEY: ${HIVEMIND_PHALA_API_KEY:?Set Phala Cloud API key}
      # Set after first deploy: https://<this_cvm_id>-8100.app.phala.network
      HIVEMIND_PHALA_PUBLIC_URL: ${HIVEMIND_PHALA_PUBLIC_URL:?Set this CVM public URL}

      # Persistent agent CVM URLs (scope/index/mediator)
      HIVEMIND_PHALA_SCOPE_URL: ${HIVEMIND_PHALA_SCOPE_URL:-}
      HIVEMIND_PHALA_INDEX_URL: ${HIVEMIND_PHALA_INDEX_URL:-}
      HIVEMIND_PHALA_MEDIATOR_URL: ${HIVEMIND_PHALA_MEDIATOR_URL:-}

      HIVEMIND_AUTOLOAD_DEFAULT_AGENTS: "false"
      HIVEMIND_ENFORCE_BRIDGE_ONLY_EGRESS: "true"

      # S3 (for run artifacts)
      HIVEMIND_S3_BUCKET: ${HIVEMIND_S3_BUCKET:-}
      HIVEMIND_S3_ENDPOINT_URL: ${HIVEMIND_S3_ENDPOINT_URL:-}
      HIVEMIND_S3_ACCESS_KEY_ID: ${HIVEMIND_S3_ACCESS_KEY_ID:-}
      HIVEMIND_S3_SECRET_ACCESS_KEY: ${HIVEMIND_S3_SECRET_ACCESS_KEY:-}
    ports:
      - "8100:8100"
