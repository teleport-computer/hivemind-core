# docker-compose.core.yaml — Phala CVM deployment for hivemind-core (App CVM)
#
# Two-surface deployment, prod9 (matches hermes / feedling Phase E):
#
#   1. Friendly URL  https://hivemind.teleport.computer
#      Served by dstack-ingress (LE cert, ACME DNS-01 inside the enclave
#      via Cloudflare). This is the default URL clients should use.
#
#   2. Raw URL       https://<app_id>-8100s.dstack-pha-prod9.phala.network
#      TCP-passthrough straight to the hivemind container's enclave TLS
#      cert (deterministic, dstack-KMS-derived, sha256(cert.DER) bound
#      into the TDX quote's REPORT_DATA). This is the Tier-3 attestation
#      pinning surface — what the CLI uses internally for /v1/attestation
#      verification, and what audit verifiers can pin out-of-band.
#
# REQUIRED CVM NODE: prod9. dstack-ingress 20250929 + the multi-domain
# `_dstack-app-address.<domain>` TXT routing only works on the prod9
# gateway. New CVM = new app_id = re-approve compose_hash on-chain.
#
# All agents run as Docker containers inside this CVM. The CVM's host
# Docker daemon is shared via socket mount. PostgreSQL runs in a separate
# CVM (see docker-compose.postgres.yaml).
#
# DNS records dstack-ingress manages automatically (CF token must have
# Zone.DNS:Edit on teleport.computer):
#   CNAME hivemind.teleport.computer  → <app-id>.dstack-pha-prod9.phala.network
#   TXT   _dstack-app-address.hivemind.teleport.computer → <app-id>:443
#   CAA   hivemind.teleport.computer  pinned to Let's Encrypt
#
# Deploy:
#   phala deploy -n hivemind-core -c deploy/phala/docker-compose.core.yaml -e deploy/phala/.env --wait

services:
  hivemind:
    # Pin to the build that attaches hivemind-core to the
    # hivemind-sandbox Docker network at startup and uses self-IP as the
    # bridge URL (v0.4.7-sandbox-net). Without this, spawned agent
    # containers cannot reach the in-process LLM bridge — the sandbox
    # network's gateway routes to the host, not into the hivemind
    # container. Symptom before the fix: claude-code crashes with
    # "Command failed with exit code 1", zero LLM calls, empty stderr.
    # The `:latest` tag in GHCR is from pre-multi-tenant main — don't use.
    image: ghcr.io/teleport-computer/hivemind-core:fd87c82
    ports:
      - "8100:8100"
    environment:
      # Database — set to the SQL proxy URL on the postgres CVM
      # Format: https://<pg_cvm_id>-8080.app.phala.network
      HIVEMIND_DATABASE_URL: ${HIVEMIND_DATABASE_URL:?Set to SQL proxy URL}
      HIVEMIND_SQL_PROXY_KEY: ${SQL_PROXY_KEY:?Set SQL proxy shared secret}

      # Server
      HIVEMIND_HOST: "0.0.0.0"
      HIVEMIND_PORT: "8100"
      HIVEMIND_CORS_ALLOW_ORIGINS: ${HIVEMIND_CORS_ALLOW_ORIGINS:-}

      # Multi-tenant control plane
      # HIVEMIND_ADMIN_KEY enables /v1/admin/tenants so you (the operator)
      # can mint per-tenant API keys. Required. Generate with:
      #   python3 -c "import secrets; print(secrets.token_urlsafe(32))"
      HIVEMIND_ADMIN_KEY: ${HIVEMIND_ADMIN_KEY:?Set admin key for tenant provisioning}
      # Must match SQL_PROXY_ADMIN_KEY on the postgres CVM — used for
      # CREATE/DROP DATABASE when provisioning/deleting tenants.
      HIVEMIND_SQL_PROXY_ADMIN_KEY: ${SQL_PROXY_ADMIN_KEY:?Set SQL proxy admin key}
      HIVEMIND_CONTROL_DATABASE: ${HIVEMIND_CONTROL_DATABASE:-hivemind_control}
      HIVEMIND_TENANT_CACHE_SIZE: ${HIVEMIND_TENANT_CACHE_SIZE:-32}

      # LLM proxy. Default model is GLM-5. Per-role overrides below let the
      # operator pin specific models per agent role; empty falls back to the
      # global HIVEMIND_LLM_MODEL.
      HIVEMIND_LLM_API_KEY: ${HIVEMIND_LLM_API_KEY:?Set LLM API key}
      HIVEMIND_LLM_BASE_URL: ${HIVEMIND_LLM_BASE_URL:-https://openrouter.ai/api/v1}
      HIVEMIND_LLM_MODEL: ${HIVEMIND_LLM_MODEL:-z-ai/glm-5}
      HIVEMIND_SCOPE_MODEL: ${HIVEMIND_SCOPE_MODEL:-}
      HIVEMIND_QUERY_MODEL: ${HIVEMIND_QUERY_MODEL:-}
      HIVEMIND_MEDIATOR_MODEL: ${HIVEMIND_MEDIATOR_MODEL:-}
      HIVEMIND_INDEX_MODEL: ${HIVEMIND_INDEX_MODEL:-}

      # Optional secondary provider. When HIVEMIND_TINFOIL_API_KEY is
      # configured, callers can flip the upstream LLM provider per-call by
      # sending ``provider="tinfoil"`` (CLI: ``--provider tinfoil``).
      # Tinfoil is OpenAI-compatible, so the same SDK is reused with a
      # different base_url + api_key. Empty disables the option.
      HIVEMIND_TINFOIL_API_KEY: ${HIVEMIND_TINFOIL_API_KEY:-}
      HIVEMIND_TINFOIL_BASE_URL: ${HIVEMIND_TINFOIL_BASE_URL:-https://inference.tinfoil.sh/v1}

      # On-chain app-auth registry (Tier 1 attestation binding).
      # When set, the CLI auto-accepts an approved compose_hash and
      # hard-aborts on a revoked one without any user prompt. Empty →
      # CLI falls back to the local TOFU / change-prompt flow.
      # Contract deployed on Sepolia 2026-04-25; owner holds the key in
      # /Users/sxysun/Desktop/suapp/feedling-mcp-v1/contracts/.env.
      HIVEMIND_APP_AUTH_CONTRACT: ${HIVEMIND_APP_AUTH_CONTRACT:-0x29b475E6D2e10bd3266569D4c5cf27BFd4f8c36E}
      HIVEMIND_APP_AUTH_CHAIN_ID: ${HIVEMIND_APP_AUTH_CHAIN_ID:-11155111}
      HIVEMIND_APP_AUTH_RPC_URL: ${HIVEMIND_APP_AUTH_RPC_URL:-https://ethereum-sepolia-rpc.publicnode.com}
      HIVEMIND_APP_AUTH_EXPLORER_BASE_URL: ${HIVEMIND_APP_AUTH_EXPLORER_BASE_URL:-https://sepolia.etherscan.io}

      # TLS-in-enclave (Tier 3 attestation binding — feedling's first binding).
      # Turn on to have the enclave terminate TLS with a deterministic
      # dstack-KMS-derived cert whose sha256(DER) is bound into the TDX
      # quote's REPORT_DATA (v2). The CLI reconstructs the binding from
      # (APP_VERSION, observed_fingerprint) and aborts on mismatch.
      # Requires: (a) the service URL uses ``-8100s.app.phala.network``
      # (the ``s`` suffix is Phala's TCP-passthrough convention), so the
      # CLI sees the enclave's self-signed cert directly. (b) the CLI
      # must be >=0.3.1 to consume the v2 report_data layout.
      HIVEMIND_ENCLAVE_TLS: ${HIVEMIND_ENCLAVE_TLS:-1}

      # Cluster-aware pinning surface. The CVM doesn't know its own
      # gateway base_domain from inside (dstack.info() doesn't expose
      # it), so we pass it in. The bundle's `tls.pinning_url` is what
      # the CLI uses for the friendly→raw Tier-3 cross-pin fallback —
      # if it points at the wrong cluster, every CLI call fails the
      # cert-fingerprint check.
      #
      # AUTO-MANAGED. `deploy/phala/deploy.sh` runs `sync_pinning_gateway`
      # before each deploy, which reads the live CVM's `gateway.base_domain`
      # via `phala cvms get` and rewrites this var in the relay's `.env`
      # to match. So a fresh relay (or one whose `.env` has stale value)
      # self-corrects on the next deploy. Don't hand-edit; if you need to
      # force a value during a cluster cutover, do it via the `.env` and
      # the next deploy will reconcile to whatever cluster the CVM is on.
      HIVEMIND_PINNING_GATEWAY: ${HIVEMIND_PINNING_GATEWAY:-dstack-pha-prod9.phala.network}

      # Docker sandbox — agents run as containers via host Docker daemon
      HIVEMIND_BRIDGE_HOST: "0.0.0.0"
      HIVEMIND_DOCKER_NETWORK_INTERNAL: "true"
      HIVEMIND_DOCKER_BUILD_NETWORK: ${HIVEMIND_DOCKER_BUILD_NETWORK:-none}
      HIVEMIND_DOCKER_BUILD_TIMEOUT_SECONDS: ${HIVEMIND_DOCKER_BUILD_TIMEOUT_SECONDS:-600}
      HIVEMIND_DOCKER_BUILD_MEMORY_MB: ${HIVEMIND_DOCKER_BUILD_MEMORY_MB:-1024}
      HIVEMIND_DOCKER_BUILD_CPU_SHARES: ${HIVEMIND_DOCKER_BUILD_CPU_SHARES:-512}
      HIVEMIND_ENFORCE_BRIDGE_ONLY_EGRESS: "true"
      HIVEMIND_ENFORCE_BRIDGE_ONLY_EGRESS_FAIL_CLOSED: "true"
      HIVEMIND_CONTAINER_MEMORY_MB: "1024"
      HIVEMIND_CONTAINER_USER: "${HIVEMIND_CONTAINER_USER:-1000:1000}"

      # Global ceilings on per-call budget. Per-call --max-tokens /
      # --max-llm-calls / --timeout flags are clamped to these. Bump
      # them when scope agents need more iterations (e.g. complex
      # GROUP BY policies on large tables).
      HIVEMIND_MAX_TOKENS: ${HIVEMIND_MAX_TOKENS:-1000000}
      HIVEMIND_MAX_LLM_CALLS: ${HIVEMIND_MAX_LLM_CALLS:-100}
      HIVEMIND_AGENT_TIMEOUT: ${HIVEMIND_AGENT_TIMEOUT:-900}
      # Metering is always recorded when available. Credit enforcement
      # rejects query-token runs without a payer key or enough balance.
      HIVEMIND_BILLING_ENFORCE_CREDITS: ${HIVEMIND_BILLING_ENFORCE_CREDITS:-true}
      HIVEMIND_SELF_SERVE_SIGNUP_ENABLED: ${HIVEMIND_SELF_SERVE_SIGNUP_ENABLED:-true}

      # Default agents — CI only builds base/core/postgres/sql-proxy +
      # base-sdk-hermes. The per-role default agents (scope/query/index/
      # mediator, both claude_code and hermes flavors) are NOT in GHCR;
      # leave AUTOLOAD=false and upload them via `hmctl room create` / the
      # /v1/room-agents API, or pre-build/push them and set AUTOLOAD=true.
      HIVEMIND_AUTOLOAD_DEFAULT_AGENTS: ${HIVEMIND_AUTOLOAD_DEFAULT_AGENTS:-false}
      HIVEMIND_DEFAULT_SCOPE_IMAGE: ${HIVEMIND_DEFAULT_SCOPE_IMAGE:-}
      HIVEMIND_DEFAULT_QUERY_IMAGE: ${HIVEMIND_DEFAULT_QUERY_IMAGE:-}
      HIVEMIND_DEFAULT_INDEX_IMAGE: ${HIVEMIND_DEFAULT_INDEX_IMAGE:-}
      HIVEMIND_DEFAULT_MEDIATOR_IMAGE: ${HIVEMIND_DEFAULT_MEDIATOR_IMAGE:-}
      HIVEMIND_DEFAULT_INDEX_HERMES_IMAGE: ${HIVEMIND_DEFAULT_INDEX_HERMES_IMAGE:-}
      HIVEMIND_DEFAULT_SCOPE_HERMES_IMAGE: ${HIVEMIND_DEFAULT_SCOPE_HERMES_IMAGE:-}
      HIVEMIND_DEFAULT_QUERY_HERMES_IMAGE: ${HIVEMIND_DEFAULT_QUERY_HERMES_IMAGE:-}
      HIVEMIND_DEFAULT_MEDIATOR_HERMES_IMAGE: ${HIVEMIND_DEFAULT_MEDIATOR_HERMES_IMAGE:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # dstack socket — lets hivemind fetch its TDX quote + measurements
      # for the /v1/attestation endpoint (compose-hash binding).
      - /var/run/dstack.sock:/var/run/dstack.sock

  # --- dstack-ingress: LE-cert TLS termination for the friendly domain. ---
  # ACME DNS-01 challenge happens inside the enclave; the CF API token
  # never leaves this container, scope is Zone.DNS:Edit on the
  # teleport.computer zone. The LE-issued cert + private key live on the
  # `letsencrypt` volume (TEE-encrypted disk).
  #
  # Upstream is hivemind:8100 over TLS (the enclave-derived cert).
  # Internal hop, internal Docker bridge — cert verification skipped at
  # the ingress. The transport secrecy that matters is wire→ingress (LE)
  # and the per-app envelope crypto on response payloads. The Tier-3
  # cert pin is still verifiable out-of-band on the `-8100s.` raw route.
  dstack-ingress:
    image: dstacktee/dstack-ingress:20250929@sha256:2b47b3e538df0b3e7724255b89369194c8c83a7cfba64d2faf0115ad0a586458
    restart: unless-stopped
    ports:
      - "443:443"
    environment:
      DOMAIN: ${HIVEMIND_FRIENDLY_DOMAIN:-hivemind.teleport.computer}
      DNS_PROVIDER: "cloudflare"
      # Required: scope = Zone.DNS:Edit on the friendly-domain zone.
      # Injected via `phala deploy -e` (encrypted env channel, not in
      # compose_hash). Failing fast if missing — silently dropping it
      # would leave the CVM with no TLS termination.
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN:?Set CF token (Zone.DNS:Edit on teleport.computer) — see deploy/phala/DEPLOY.md}
      GATEWAY_DOMAIN: "_.dstack-pha-prod9.phala.network"
      CERTBOT_EMAIL: ${CERTBOT_EMAIL:-sxysun9@gmail.com}
      SET_CAA: "true"
      # Upstream — hivemind speaks enclave-TLS on 8100. ingress
      # re-encrypts toward LE cert on the public side.
      TARGET_ENDPOINT: "https://hivemind:8100"
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - hivemind_ingress_letsencrypt:/etc/letsencrypt
      - hivemind_ingress_evidences:/evidences
    depends_on:
      - hivemind

volumes:
  hivemind_ingress_letsencrypt:
    name: hivemind_ingress_letsencrypt
  hivemind_ingress_evidences:
    name: hivemind_ingress_evidences
