# docker-compose.yaml — Monitoring TEE for hivemind deploy governance
#
# Deploy as a separate dstack app:
#   phala deploy -n hivemind-monitor -c docker-compose.yaml
#
# The monitoring TEE's app_id determines the notary key:
#   notary_key = KDF(kms_root, [monitoring_app_id, "/notary/signer"])
#   notary_address = eth_address(notary_key)
#
# Set this address as the notary in NotarizedAppAuth.sol.

services:
  monitor:
    build: .
    environment:
      CONTRACT_ADDRESS: ${CONTRACT_ADDRESS}
      RPC_URL: ${RPC_URL:-https://mainnet.base.org}
      NOTIFY_WEBHOOK: ${NOTIFY_WEBHOOK:-}
      IPFS_API: ${IPFS_API:-http://127.0.0.1:5001}
      POLL_INTERVAL: ${POLL_INTERVAL:-5}
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
