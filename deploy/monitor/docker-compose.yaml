# docker-compose.yaml — Monitoring TEE for hivemind deploy governance
#
# The notary key is provided via NOTARY_PRIVATE_KEY (64 hex chars).
# The derived eth address must be set as the notary in NotarizedAppAuth.sol.

services:
  monitor:
    build: .
    environment:
      CONTRACT_ADDRESS: ${CONTRACT_ADDRESS}
      RPC_URL: ${RPC_URL:-https://mainnet.base.org}
      NOTIFY_WEBHOOK: ${NOTIFY_WEBHOOK:-}
      IPFS_API: ${IPFS_API:-http://127.0.0.1:5001}
      POLL_INTERVAL: ${POLL_INTERVAL:-5}
      NOTARY_PRIVATE_KEY: ${NOTARY_PRIVATE_KEY}
