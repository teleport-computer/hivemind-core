# docker-compose.yaml — dstack CVM deployment for hivemind-core
#
# Deploy: phala deploy -n hivemind -c docker-compose.yaml --disk 50G
#
# Inside the CVM:
#   - Postgres stores plaintext on LUKS2-encrypted disk (dstack handles FDE)
#   - WAL-G archives WAL segments to Cloudflare R2 (encrypted with KMS-derived key)
#   - hivemind talks to Postgres over localhost
#
# Key derivation (all from dstack KMS, deterministic per app_id):
#   disk_crypt_key: KDF(root, [app_id, instance_id, "app-disk-crypt-key"]) — dstack auto
#   db_password:    getKey("/hivemind/db-password") — derived by both containers
#   backup_key:     getKey("/hivemind/backup") — WAL-G libsodium encryption
#
# Local dev (no dstack socket):
#   Set DB_PASS, POSTGRES_PASSWORD in .env or let boot scripts use random values.

services:
  db:
    build:
      context: .
      dockerfile: postgres/Dockerfile
    environment:
      POSTGRES_DB: hivemind
      POSTGRES_USER: hivemind
      # POSTGRES_PASSWORD derived from KMS by entrypoint-wrapper.sh
      # For local dev: set DB_PASS in .env or shell
      POSTGRES_PASSWORD: ${DB_PASS:?DB_PASS must be set (derived from KMS or provided)}

      # R2/S3 backup config
      WALG_S3_PREFIX: ${WALG_S3_PREFIX:-}
      AWS_ENDPOINT: ${R2_ENDPOINT:-}
      AWS_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - /var/run/dstack.sock:/var/run/dstack.sock
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hivemind"]
      interval: 5s
      timeout: 3s
      retries: 10

  hivemind:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      # DB_PASS derived from KMS by boot.sh (same path as db container)
      # For local dev: set DB_PASS in .env or shell
      DB_PASS: ${DB_PASS:?DB_PASS must be set (derived from KMS or provided)}

      # Server config
      HIVEMIND_HOST: "0.0.0.0"
      HIVEMIND_PORT: "8100"
      HIVEMIND_API_KEY: ${HIVEMIND_API_KEY}

      # LLM proxy
      HIVEMIND_LLM_API_KEY: ${HIVEMIND_LLM_API_KEY}
      HIVEMIND_LLM_BASE_URL: ${HIVEMIND_LLM_BASE_URL:-https://openrouter.ai/api/v1}
      HIVEMIND_LLM_MODEL: ${HIVEMIND_LLM_MODEL:-anthropic/claude-sonnet-4.5}

      # Sandbox
      HIVEMIND_AUTOLOAD_DEFAULT_AGENTS: "false"
      HIVEMIND_ENFORCE_BRIDGE_ONLY_EGRESS: "true"
    ports:
      - "8100:8100"
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock

volumes:
  pgdata:
