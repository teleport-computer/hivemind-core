# docker-compose.yaml — CVM deployment for hivemind-core
#
# Deploy: phala deploy -n hivemind -c docker-compose.yaml --disk 50G
#
# Inside the CVM:
#   - Postgres stores data on LUKS2-encrypted disk (dstack handles FDE)
#   - WAL-G archives WAL segments to Cloudflare R2
#   - hivemind talks to Postgres over localhost
#
# Required environment variables:
#   DB_PASS              — shared Postgres password (set in .env or shell)
#   WALG_S3_PREFIX       — R2/S3 bucket prefix for WAL-G (optional, enables backups)
#   WALG_LIBSODIUM_KEY   — 64 hex char encryption key for WAL-G (optional, enables encrypted backups)
#   R2_ENDPOINT          — Cloudflare R2 endpoint URL
#   R2_ACCESS_KEY_ID     — R2 access key
#   R2_SECRET_ACCESS_KEY — R2 secret key

services:
  db:
    build:
      context: .
      dockerfile: postgres/Dockerfile
    environment:
      POSTGRES_DB: hivemind
      POSTGRES_USER: hivemind
      POSTGRES_PASSWORD: ${DB_PASS:?DB_PASS must be set}

      # R2/S3 backup config (WAL-G)
      WALG_S3_PREFIX: ${WALG_S3_PREFIX:-}
      WALG_LIBSODIUM_KEY: ${WALG_LIBSODIUM_KEY:-}
      AWS_ENDPOINT: ${R2_ENDPOINT:-}
      AWS_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      AWS_S3_FORCE_PATH_STYLE: "true"
      AWS_REGION: "auto"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hivemind"]
      interval: 5s
      timeout: 3s
      retries: 10

  hivemind:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_PASS: ${DB_PASS:?DB_PASS must be set}

      # Server config
      HIVEMIND_HOST: "0.0.0.0"
      HIVEMIND_PORT: "8100"
      HIVEMIND_API_KEY: ${HIVEMIND_API_KEY}

      # LLM proxy
      HIVEMIND_LLM_API_KEY: ${HIVEMIND_LLM_API_KEY}
      HIVEMIND_LLM_BASE_URL: ${HIVEMIND_LLM_BASE_URL:-https://openrouter.ai/api/v1}
      HIVEMIND_LLM_MODEL: ${HIVEMIND_LLM_MODEL:-anthropic/claude-sonnet-4.5}

      # R2 for query agent result uploads (reuses same R2 credentials)
      HIVEMIND_S3_BUCKET: ${R2_BUCKET:-}
      HIVEMIND_S3_ENDPOINT_URL: ${R2_ENDPOINT:-}
      HIVEMIND_S3_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      HIVEMIND_S3_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      HIVEMIND_S3_REGION: "auto"
      HIVEMIND_S3_PREFIX: "query-agent-runs"

      # Sandbox
      HIVEMIND_AUTOLOAD_DEFAULT_AGENTS: "false"
      HIVEMIND_ENFORCE_BRIDGE_ONLY_EGRESS: "true"
    ports:
      - "8100:8100"

volumes:
  pgdata:
